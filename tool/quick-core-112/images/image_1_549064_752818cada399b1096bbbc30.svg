	<text transform="matrix(1 0 0 1 -179 60.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="3">Strokes</text>
	<text transform="matrix(1 0 0 1 -179 65.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">Try to keep strokes at 4px</text>
	<text transform="matrix(1 0 0 1 -179 70.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">Minimum stroke weight is 2px</text>
	<text transform="matrix(1 0 0 1 -179 74.6563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">For thicker strokes use even </text>
	<text transform="matrix(1 0 0 1 -179 77.6563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">numbers: 6px, 8px etc.</text>
	<text transform="matrix(1 0 0 1 -179 82.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">Remember to expand strokes </text>
	<text transform="matrix(1 0 0 1 -179 85.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">before saving as an SVG </text>
	<rect x="-136.5" y="58" fill="none" width="35" height="32.5"/>
	<text transform="matrix(1 0 0 1 -136.5 60.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="3">Size</text>
	<text transform="matrix(1 0 0 1 -136.5 65.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">Cannot be wider or taller than </text>
	<text transform="matrix(1 0 0 1 -136.5 68.6563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">100px (artboard size)</text>
	<text transform="matrix(1 0 0 1 -136.5 73.6563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">Scale your icon to fill as much of </text>
	<text transform="matrix(1 0 0 1 -136.5 76.6563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">the artboard as possible</text>
