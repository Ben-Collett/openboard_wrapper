	<text transform="matrix(1 0 0 1 -94 60.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="3">Ungroup</text>
	<text transform="matrix(1 0 0 1 -94 65.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">If your design has more than one </text>
	<text transform="matrix(1 0 0 1 -94 68.1563)" font-family="'HelveticaRoundedLT-Bold'" font-size="2.4">shape, make sure to ungroup</text>
